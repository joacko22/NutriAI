services:
  postgres:
    image: postgres:16-alpine
    container_name: nutriai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutriai
      POSTGRES_PASSWORD: nutriai_dev
      POSTGRES_DB: nutriai
    ports:
      - "5432:5432"
    volumes:
      - nutriai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutriai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nutriai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nutriai_pg_data:
